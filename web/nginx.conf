# nginx config for the freehire SPA container. Mirrors the dev Vite proxy:
# the browser only ever talks to this origin; /api (and /health) are proxied
# to the backend service so the auth cookie stays same-origin.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Backend service name inside the compose network.
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        proxy_pass http://app:8080;
    }

    # Hashed build assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The CLI install script (web/public/install.sh), served as plain text so
    # `curl -fsSL https://freehire.dev/install.sh | sh` works and a browser can
    # read it before piping to a shell.
    location = /install.sh {
        default_type text/plain;
    }

    # SPA fallback: client-side router owns all other paths.
    location / {
        try_files $uri /index.html;
    }
}
