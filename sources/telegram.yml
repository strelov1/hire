# Telegram channels crawled by cmd/tg-ingest (see internal/telegram).
#
# kind steers the extraction prompt:
#   authored — editorial channel; one post may bundle several vacancies (0..N)
#   board    — job-board channel; one post is normally one vacancy
#
# Curated tier-1 list from the 2026-06-12 research: every channel verified to
# have the public t.me/s preview enabled and a post within the last 30 days.
# Aggregator-bot channels (reposting their own job sites, e.g. remoteyeah) are
# deliberately excluded — they duplicate the ATS boards sources.yml already
# covers. The vetted expansion backlog is ~343 channels.

channels:
  # --- Authored / curated ---
  - channel: hrlunapark
    kind: authored
  - channel: normrabota
    kind: authored
  - channel: budujobs
    kind: authored

